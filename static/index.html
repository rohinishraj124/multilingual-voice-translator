<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Translator | Glassmorphism</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="background-animation"></div>
    
    <div class="glass-container w-full max-w-4xl p-8 rounded-3xl shadow-2xl relative z-10">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-white mb-2 tracking-tight">🌐 Voice Translator</h1>
            <p class="text-blue-100 text-opacity-80">Whisper · NLLB-200 · MMS-TTS</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Left Side: Controls -->
            <div class="space-y-6">
                <div class="glass-card p-6 rounded-2xl">
                    <label class="block text-sm font-medium text-white mb-3">Target Language</label>
                    <select id="target-lang" class="w-full bg-white bg-opacity-20 border border-white border-opacity-30 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all cursor-pointer">
                        <option value="English">English</option>
                        <option value="Hindi" selected>Hindi</option>
                        <option value="Spanish">Spanish</option>
                        <option value="French">French</option>
                        <option value="German">German</option>
                        <option value="Urdu">Urdu</option>
                        <option value="Arabic">Arabic</option>
                        <option value="Portuguese">Portuguese</option>
                    </select>
                </div>

                <div class="glass-card p-6 rounded-2xl flex flex-col items-center justify-center">
                    <button id="record-btn" class="w-24 h-24 rounded-full bg-red-500 hover:bg-red-600 shadow-lg flex items-center justify-center transition-all transform hover:scale-105 active:scale-95 group mb-4">
                        <i id="record-icon" class="fas fa-microphone text-3xl text-white"></i>
                    </button>
                    <p id="record-status" class="text-white font-medium">Click to Record</p>
                    <p id="timer" class="text-blue-200 text-sm mt-1 hidden">00:00</p>
                </div>

                <div class="glass-card p-6 rounded-2xl">
                    <div class="flex items-center justify-between mb-4">
                        <label class="text-sm font-medium text-white">Voice Preservation</label>
                        <input type="checkbox" id="preserve-voice" checked class="w-5 h-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    </div>
                    <label class="block text-xs text-blue-100 opacity-70 mb-2">Conversion Strength</label>
                    <input type="range" id="vc-strength" min="0.1" max="1.0" step="0.05" value="0.6" class="w-full h-2 bg-white bg-opacity-20 rounded-lg appearance-none cursor-pointer accent-blue-400">
                </div>
            </div>

            <!-- Right Side: Results -->
            <div class="space-y-6">
                <div class="glass-card p-6 rounded-2xl h-full flex flex-col">
                    <h3 class="text-white font-semibold mb-4 flex items-center gap-2">
                        <i class="fas fa-align-left text-blue-300"></i> Transcription
                    </h3>
                    <div id="source-text" class="flex-grow bg-black bg-opacity-20 rounded-xl p-4 text-white text-sm overflow-y-auto min-h-[100px] mb-6 empty:after:content-['Awaiting_speech...'] empty:after:opacity-40"></div>

                    <h3 class="text-white font-semibold mb-4 flex items-center gap-2">
                        <i class="fas fa-language text-blue-300"></i> Translation
                    </h3>
                    <div id="translated-text" class="flex-grow bg-black bg-opacity-20 rounded-xl p-4 text-white text-sm overflow-y-auto min-h-[100px] mb-6 empty:after:content-['Awaiting_translation...'] empty:after:opacity-40"></div>

                    <div id="audio-result" class="hidden">
                        <h3 class="text-white font-semibold mb-3 flex items-center gap-2">
                            <i class="fas fa-volume-up text-blue-300"></i> Output
                        </h3>
                        <audio id="audio-player" controls class="w-full h-10 accent-blue-400"></audio>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-10 text-center">
            <p class="text-white text-opacity-40 text-xs">Built with FastAPI & Deep Learning</p>
        </footer>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-black bg-opacity-60 backdrop-blur-md z-50 flex flex-col items-center justify-center hidden">
        <div class="loader mb-4"></div>
        <p class="text-white font-medium tracking-widest uppercase text-xs">Processing Audio</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
